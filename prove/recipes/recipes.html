<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="recipes.css">
    <script src="recipes.js" defer></script>
    <title>Recipe Book</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img id="logo" src="images/recipe-book.png" alt="Recipe book logo">
      <h1>Recipe Book</h1>
    </header>
    <main id="recipe-box">
      <div id="search-bar">
        <input id="search" type="text" placeholder="Find a Recipe">
        <button id="search-button"><img id="search-icon" src="images/search_icon.svg" alt="Magnifying glass icon"></button>
      </div>
      <section id="recipe-display">

      </section>

    </main>

  <footer>
    <div class="social">
    <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
    <a class="icon" href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
    <a class="icon" href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
    <a class="icon" href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
  </div>  
  <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik - Flaticon</a>                
</footer>

                
</body>
</html>
